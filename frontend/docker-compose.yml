# Local PostgreSQL for development (port 5432).
# Start: npm run db:up
# DATABASE_URL must match POSTGRES_* below, e.g.:
# postgresql://workflow_user:password123@localhost:5432/workflow_ai

services:
  postgres:
    image: postgres:16-alpine
    container_name: workflow-automation-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: workflow_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: workflow_ai
    volumes:
      - workflow_automation_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow_user -d workflow_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  workflow_automation_pgdata:
