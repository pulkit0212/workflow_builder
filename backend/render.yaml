# Render Blueprint — repo root: artivaa-backend
# Manual services: set sync:false secrets in Render Dashboard before first deploy.
services:
  - type: web
    name: artivaa-api
    runtime: node
    rootDir: express-api
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: BOT_BASE_URL
        sync: false
      - key: BOT_UPLOAD_SECRET
        sync: false
      - key: RECORDINGS_DIR
        value: ./private/recordings
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

  - type: web
    name: artivaa-bot
    runtime: docker
    dockerfilePath: ./Dockerfile.bot
    dockerContext: .
    healthCheckPath: /health
    plan: standard
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_PORT
        value: "8000"
      - key: BOT_HEADLESS
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: BOT_NAME
        value: Artivaa Notetaker
      - key: MEETING_AUDIO_SOURCE
        value: default
      - key: EXPRESS_API_URL
        sync: false
      - key: BOT_UPLOAD_SECRET
        sync: false
